<dialog class="auth-modal email-opt-in-modal" id="email-opt-in-modal" aria-labelledby="email-opt-in-title">
  <p class="eyebrow">Product updates</p>
  <h2 id="email-opt-in-title">Stay in the loop?</h2>
  <p class="email-opt-in-copy">Would you like to receive occasional MyTubeNow product updates so you don't miss important changes?</p>

  <div class="email-opt-in-actions">
    <button type="button" data-email-opt-in-accept>Yes, include me</button>
    <button class="secondary-button" type="button" data-email-opt-in-decline>Continue without updates</button>
  </div>
</dialog>
